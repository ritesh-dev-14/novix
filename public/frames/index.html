<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smooth Scroll Animation</title>
  <style>
    :root {
      --glow-color: #00e5ff;
      --bg-color: #030712;
    }
    
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
      color: #fff;
    }

    /* Fixed Canvas Container */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 5;
      overflow: hidden;
      pointer-events: none; /* Let scroll events pass through to body */
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Dummy scroll height to trigger scrolling */
    #scroll-buffer {
      height: 800vh; /* Smooth scrub height */
      position: relative;
      z-index: 1;
    }

    /* Sleek Loader */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s;
    }

    .loader-content {
      text-align: center;
      max-width: 300px;
      width: 80%;
    }

    .loader-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.7);
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0088ff, var(--glow-color));
      box-shadow: 0 0 8px var(--glow-color);
      transition: width 0.1s ease-out;
    }

    .percentage {
      font-size: 0.9rem;
      font-family: monospace;
      color: var(--glow-color);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }

    /* Custom Scrollbar for premium feel */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 229, 255, 0.2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 229, 255, 0.5);
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader">
    <div class="loader-content">
      <div class="loader-title">Preloading Assets</div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="percentage" id="percentage">0%</div>
    </div>
  </div>

  <!-- Animation Canvas -->
  <div id="canvas-container">
    <canvas id="scroll-canvas"></canvas>
  </div>

  <!-- Scroll buffer to enable scrolling -->
  <div id="scroll-buffer"></div>

  <script>
    const canvas = document.getElementById("scroll-canvas");
    const context = canvas.getContext("2d");
    const loader = document.getElementById("loader");
    const progressBar = document.getElementById("progress-bar");
    const percentageText = document.getElementById("percentage");

    const frameCount = 271;
    const images = [];
    let imagesLoaded = 0;
    
    // Smooth scrolling lerp state
    let targetFrame = 0;
    let smoothFrame = 0;
    let isLoaded = false;

    // Helper to get image filename by index (1-based)
    const getFrameUrl = (index) => {
      const frameNum = String(index).padStart(3, '0');
      return `./ezgif-frame-${frameNum}.jpg`;
    };

    // Update loader progress UI
    function updateLoader(progress) {
      const percentage = Math.round(progress * 100);
      progressBar.style.width = `${percentage}%`;
      percentageText.textContent = `${percentage}%`;
    }

    // Centered cover drawing
    function drawFrame(index) {
      const img = images[index];
      if (!img || !img.complete) return;

      // Clear canvas
      context.clearRect(0, 0, canvas.width, canvas.height);

      const canvasWidth = canvas.width;
      const canvasHeight = canvas.height;
      const imgWidth = img.naturalWidth;
      const imgHeight = img.naturalHeight;

      const canvasRatio = canvasWidth / canvasHeight;
      const imageRatio = imgWidth / imgHeight;

      let drawWidth, drawHeight, drawX, drawY;

      if (canvasRatio > imageRatio) {
        // Canvas is wider than image (scale width to fit)
        drawWidth = canvasWidth;
        drawHeight = canvasWidth / imageRatio;
        drawX = 0;
        drawY = (canvasHeight - drawHeight) / 2;
      } else {
        // Canvas is taller than image (scale height to fit)
        drawWidth = canvasHeight * imageRatio;
        drawHeight = canvasHeight;
        drawX = (canvasWidth - drawWidth) / 2;
        drawY = 0;
      }

      // Draw the frame
      context.drawImage(img, drawX, drawY, drawWidth, drawHeight);
    }

    // Handle resize with proper pixel ratio
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      
      // Keep style mapping clean
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';

      // Redraw frame immediately on resize
      if (isLoaded) {
        drawFrame(Math.round(smoothFrame));
      }
    }

    // Main animation loop
    function animate() {
      // Lerp logic for smooth scrolling
      const ease = 0.08;
      const diff = targetFrame - smoothFrame;

      if (Math.abs(diff) > 0.005) {
        smoothFrame += diff * ease;
        // Keep smooth frame bounded
        smoothFrame = Math.max(0, Math.min(frameCount - 1, smoothFrame));
        drawFrame(Math.round(smoothFrame));
      }

      requestAnimationFrame(animate);
    }

    // Set target frame based on current scroll position
    function handleScroll() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight;
      const winHeight = window.innerHeight;
      const maxScroll = docHeight - winHeight;
      
      const scrollFraction = maxScroll <= 0 ? 0 : scrollTop / maxScroll;
      
      // Map fraction [0, 1] to frame array indices [0, 270]
      targetFrame = scrollFraction * (frameCount - 1);
    }

    // Hide loader and initialize animation
    function onAllLoaded() {
      isLoaded = true;
      
      // Set initial size and draw first frame
      resizeCanvas();
      
      // Hide loader with a nice fadeout animation
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.visibility = 'hidden';
      }, 800);

      // Listeners
      window.addEventListener('resize', resizeCanvas);
      window.addEventListener('scroll', handleScroll);
      
      // Initialize scrolling position logic
      handleScroll();
      smoothFrame = targetFrame; // Snap immediately on start
      drawFrame(Math.round(smoothFrame));

      // Start tick
      requestAnimationFrame(animate);
    }

    // Preload all 271 images
    function preloadImages() {
      for (let i = 1; i <= frameCount; i++) {
        const img = new Image();
        img.src = getFrameUrl(i);
        
        img.onload = () => {
          imagesLoaded++;
          updateLoader(imagesLoaded / frameCount);
          if (imagesLoaded === frameCount) {
            onAllLoaded();
          }
        };

        img.onerror = () => {
          imagesLoaded++;
          updateLoader(imagesLoaded / frameCount);
          if (imagesLoaded === frameCount) {
            onAllLoaded();
          }
        };

        images.push(img);
      }
    }

    // Initialize preloading
    preloadImages();
  </script>
</body>
</html>
